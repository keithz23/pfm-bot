services:
  db:
    image: postgres:15
    container_name: pfm-db-dev
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: pfm-redis-dev
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pfm-app-dev
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      TELEGRAF_TOKEN: ${TELEGRAF_TOKEN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main.js"

volumes:
  postgres-data:
  redis-data: