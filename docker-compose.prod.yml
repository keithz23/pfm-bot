services:
  db:
    image: postgres:15-alpine
    container_name: pfm-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: pfm-redis
    restart: always
    volumes:
      - redis-data:/data

  app:
    image: keith0309/pfm-bot:latest
    container_name: pfm-app
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      TELEGRAF_TOKEN: ${TELEGRAF_TOKEN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Ho_Chi_Minh
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main.js"

volumes:
  postgres-data:
  redis-data: