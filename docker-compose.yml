version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pfm-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: pfm-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pfm-app
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: >
      sh -c "npx prisma migrate deploy && npm run start:prod"

volumes:
  postgres-data:
  redis-data: